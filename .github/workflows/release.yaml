name: Release

on:
  push:
    tags:
    - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
    steps:
    - name: Checkout the code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # checkout v7
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # setup-go v7.0.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # setup-buildx-action v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # login-action v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Verify changie release notes exist
      run: |
        if [ ! -f "changes/${{ github.ref_name }}.md" ]; then
          echo "::error::Changie fragment changes/${{ github.ref_name }}.md not found."
          echo "::error::Run 'changie batch ${{ github.ref_name }}' and 'changie merge' before pushing the tag."
          exit 1
        fi
    - name: Execute GoReleaser
      uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # goreleaser-action v7
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean --release-notes changes/${{ github.ref_name }}.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
