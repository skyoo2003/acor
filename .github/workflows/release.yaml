name: Release

on:
  push:
    tags:
    - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
    steps:
    - name: Checkout the code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Verify changie release notes exist
      run: |
        if [ ! -f "changes/${{ github.ref_name }}.md" ]; then
          echo "::error::Changie fragment changes/${{ github.ref_name }}.md not found."
          echo "::error::Run 'changie batch ${{ github.ref_name }}' and 'changie merge' before pushing the tag."
          exit 1
        fi
    - name: Execute GoReleaser
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # goreleaser-action v7
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean --release-notes changes/${{ github.ref_name }}.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload assets
      uses: actions/upload-artifact@v7
      with:
        name: acor
        path: dist/*
