name: Go

on:
  push:
    branches:
      - master
    paths:
      - "**/*.go"
      - "Makefile"
      - "docs/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yaml"
      - ".golangci.yaml"
  pull_request:
    branches:
      - master
    paths:
      - "**/*.go"
      - "Makefile"
      - "docs/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yaml"
      - ".golangci.yaml"

jobs:
  build:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25", "1.26"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: |
            go.sum
            server/go.sum
      - name: Execute golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # golangci-lint-action v9.3.0
        with:
          version: v2.11.3
      - name: Execute golangci-lint (server module)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # golangci-lint-action v9.3.0
        with:
          version: v2.11.3
          working-directory: server
      - name: Run go vet
        run: go vet ./...
      - name: Run go vet (server module)
        run: go vet ./...
        working-directory: server
      - name: Check SPDX headers
        run: |
          missing=$(git ls-files '*.go' | xargs -r grep -L -E '^// SPDX-License-Identifier:' || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX headers in:"
            echo "$missing"
            exit 1
          fi
      - name: Run test
        run: go test -race -v ./...
      - name: Run test (server module)
        run: go test -race -v ./...
        working-directory: server
      - name: Check coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${coverage}%"
          if [ "$(echo "$coverage < 70" | bc)" -eq 1 ]; then
            echo "Coverage ${coverage}% is below threshold 70%"
            exit 1
          fi
      - name: Run fuzz testing
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          go test -fuzz=FuzzFind -fuzztime=30s ./pkg/acor
          go test -fuzz=FuzzAdd -fuzztime=30s ./pkg/acor
      - name: Run build
        run: make build
