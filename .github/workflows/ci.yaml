name: Go

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "Makefile"
      - "docs/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yaml"
      - ".golangci.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.go"
      - "Makefile"
      - "docs/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yaml"
      - ".golangci.yaml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25", "1.26"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # checkout v7
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # setup-go v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: |
            go.sum
            server/go.sum
      - name: Execute golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # golangci-lint-action v9.3.0
        with:
          version: v2.11.3
      - name: Execute golangci-lint (server module)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # golangci-lint-action v9.3.0
        with:
          version: v2.11.3
          working-directory: server
      - name: Run go vet
        run: go vet ./...
      - name: Run go vet (server module)
        run: go vet ./...
        working-directory: server
      - name: Check SPDX headers
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          missing=$(git ls-files '*.go' | xargs grep -L -E '^// SPDX-License-Identifier:' || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX headers in:"
            echo "$missing"
            exit 1
          fi
      - name: Run test
        run: go test -race -v -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Run test (server module)
        run: go test -race -v -covermode=atomic -coverprofile=coverage.out ./...
        working-directory: server
      - name: Check coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          fail=0
          for mod in . server; do
            # Run in each module's dir: server/ is a separate go.mod, so the
            # cover tool needs that module's context to resolve packages.
            # Exclude generated protobuf (*.pb.go) from the coverage denominator.
            coverage=$(cd "$mod" && grep -v '\.pb\.go:' coverage.out > coverage.nogen.out && go tool cover -func=coverage.nogen.out | tail -1 | awk '{print $3}' | sed 's/%//')
            echo "${mod}: ${coverage}%"
            awk -v c="$coverage" 'BEGIN { exit (c < 70) ? 1 : 0 }' \
              || { echo "::error::${mod} coverage ${coverage}% is below threshold 70%"; fail=1; }
          done
          exit $fail
      - name: Run fuzz testing
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          go test -fuzz=FuzzFind -fuzztime=30s ./pkg/acor
          go test -fuzz=FuzzAdd -fuzztime=30s ./pkg/acor
      - name: Run build
        run: make build
      - name: Verify documentation examples compile
        run: make docs-verify

  integration:
    name: Integration (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - server: redis
            image: redis:8
            ping: redis-cli ping
          - server: valkey
            image: valkey/valkey:8
            ping: valkey-cli ping
    services:
      backend:
        image: ${{ matrix.image }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "${{ matrix.ping }}"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # checkout v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # setup-go v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - name: Run integration tests against ${{ matrix.server }}
        env:
          ACOR_INTEGRATION_ADDR: localhost:6379
        run: go test -race -run Integration -count=1 -v ./pkg/acor
