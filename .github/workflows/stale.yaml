name: Stale

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 14
          days-before-close: 30
          days-before-pr-stale: 7
          days-before-pr-close: 30
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.
            Thank you for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If you believe this is still relevant, please reopen it or create a new issue.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            If you would like to continue working on it, please reopen it.
          exempt-issue-labels: "breaking_changes,epic,release"
          exempt-pr-labels: "breaking_changes,release"
          remove-stale-when-updated: true
          delete-branch: false
