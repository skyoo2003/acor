name: CodeQL

on:
  push:
    branches:
      - master
    paths:
      - "**/*.go"
  pull_request:
    branches:
      - master
    paths:
      - "**/*.go"
  schedule:
    - cron: "15 3 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual
      - run: |
          go build ./...
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
