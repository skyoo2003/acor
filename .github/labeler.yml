# Labeler configuration - auto-label PRs based on changed files
"documentation":
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "**/*.md"]
      - any-glob-to-any-file: ["README.md", "CHANGELOG.md", "CONTRIBUTING.md"]

"dependencies":
  - changed-files:
      - any-glob-to-any-file: ["go.mod", "go.sum"]

"github_actions":
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**", ".github/dependabot.yaml"]

"go":
  - changed-files:
      - any-glob-to-any-file: ["**/*.go"]

"enhancement":
  - changed-files:
      - any-glob-to-any-file: ["pkg/**/*.go"]

# Public API surface: any change to the core package. Broad on purpose so new
# files can't silently escape the label; a maintainer removes it when a change
# in here isn't actually breaking (e.g. a test-only or comment change).
"breaking_changes":
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/acor/*.go"
