# Labeler configuration - auto-label PRs based on changed files
"documentation":
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "**/*.md"]
      - any-glob-to-any-file: ["README.md", "CHANGELOG.md", "CONTRIBUTING.md"]

"dependencies":
  - changed-files:
      - any-glob-to-any-file: ["go.mod", "go.sum"]

"github_actions":
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**", ".github/dependabot.yaml"]

"go":
  - changed-files:
      - any-glob-to-any-file: ["**/*.go"]

"enhancement":
  - changed-files:
      - any-glob-to-any-file: ["pkg/**/*.go"]

"breaking_changes":
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/acor/acor.go"
          - "pkg/acor/interfaces.go"
          - "pkg/acor/engine.go"
          - "pkg/acor/modes.go"
          - "pkg/acor/errors.go"
          - "pkg/acor/options.go"
          - "pkg/acor/operations.go"
          - "pkg/acor/client.go"
          - "pkg/acor/batch.go"
          - "pkg/acor/parallel.go"
          - "pkg/acor/pubsub.go"
          - "pkg/acor/storage.go"
          - "pkg/acor/context_ops.go"
          - "pkg/acor/schema.go"
          - "pkg/acor/v1_ops.go"
          - "pkg/acor/v2_ops.go"
          - "pkg/acor/v2_transaction.go"
