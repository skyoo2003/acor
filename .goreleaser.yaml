version: 2

project_name: acor

env:
- GO111MODULE=on
- CGO_ENABLED=0

before:
  hooks:
  - go mod download

builds:
- id: acor
  binary: acor
  main: cmd/acor/main.go
  goos:
  - darwin
  - linux
  - windows
  goarch:
  - 386
  - amd64
  - arm
  - arm64
  goarm:
  - 6
  - 7
  ignore:
  - goos: darwin
    goarch: 386
  - goos: linux
    goarch: arm
    goarm: 6

archives:
- id: acor
  format: tar.gz
  format_overrides:
  - goos: windows
    format: zip
  files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - CODE_OF_CONDUCT.md

changelog:
  disable: false

checksum:
  algorithm: sha256
  name_template: 'CHECKSUMS'

dockers_v2:
- images:
  - ghcr.io/skyoo2003/acor
  dockerfile: Dockerfile.goreleaser
  ids:
  - acor
  sbom: false
  flags:
  - "--provenance=false"
  tags:
  - "{{ .Tag }}-alpine"
  - "v{{ .Major }}.{{ .Minor }}-alpine"
  - "v{{ .Major }}-alpine"
  - "latest-alpine"
  labels:
    org.opencontainers.image.created: "{{ .Date }}"
    org.opencontainers.image.source: "https://github.com/skyoo2003/acor"
    org.opencontainers.image.title: "{{ .ProjectName }}"
    org.opencontainers.image.revision: "{{ .FullCommit }}"
    org.opencontainers.image.version: "{{ .Version }}"

release:
  github:
    owner: skyoo2003
    name: acor
  name_template: "v{{ .Version }}"
  disable: false
  mode: replace
