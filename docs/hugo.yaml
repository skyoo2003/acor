baseURL: https://skyoo2003.github.io/acor/
languageCode: en-us
title: ACOR Docs
disableKinds:
  - taxonomy
  - term
caches:
  images:
    dir: :cacheDir/images
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        enable: true
  highlight:
    codeFences: true
    guessSyntax: true
    style: github
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
menu:
