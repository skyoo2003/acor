    - name: Getting Started
      url: /getting-started/
      weight: 1
    - name: Guides
      url: /guides/
      weight: 2
    - name: Reference
      url: /reference/
      weight: 3
    - name: Operations
      url: /operations/
      weight: 4
    - name: Extending
      url: /extending/
      weight: 5
